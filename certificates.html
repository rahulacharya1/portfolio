<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificates | Rahul Kumar Acharya</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-menu { animation: fadeInDown 0.3s ease-out forwards; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #020617; border-radius: 10px; }

        .cert-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-950 text-gray-200 selection:bg-sky-500/30">

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-4">
                My <span class="text-sky-400">Achievements</span>
            </h2>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg">
                Professional certifications and job simulations from leading tech organizations.
            </p>
        </div>

        <div id="certificates-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="popup" class="fixed hidden inset-0 z-[100] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4" onclick="closeImg()">
        <div class="relative max-w-5xl w-full flex flex-col items-center">
            <button class="absolute -top-12 right-0 text-white text-4xl hover:text-sky-400 transition">✕</button>
            <img id="popup-img" class="max-w-full max-h-[85vh] rounded-xl shadow-2xl border border-slate-700 object-contain" onclick="event.stopPropagation()">
        </div>
    </div>

    <footer class="text-center py-10 text-slate-500 bg-slate-950 border-t border-slate-900">
        <p class="text-sm">© 2026 Rahul Kumar Acharya • CSE Student & Full-Stack Developer</p>
    </footer>

    <script src="JS/header.js"></script>
    <script src="JS/certificates.js"></script>

</body>
</html>
