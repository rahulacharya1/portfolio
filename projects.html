<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects | Rahul Kumar Acharya</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-menu { animation: fadeInDown 0.3s ease-out forwards; }
        
        /* Custom Professional Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #020617; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #020617; }

        .project-card:hover img { transform: scale(1.1); }
    </style>
</head>

<body class="bg-slate-950 text-gray-200 min-h-screen flex flex-col selection:bg-sky-500/30">

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto flex-1">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-4">
                My <span class="text-sky-400">Projects</span>
            </h2>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg font-light">
                From complex <span class="text-sky-400">Django</span> backends to interactive <span class="text-sky-400">React</span> interfaces.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="projects-container">
            </div>
    </main>

    <footer class="text-center py-10 text-slate-500 bg-slate-950 border-t border-slate-900">
        <p class="text-sm">© 2026 Rahul Kumar Acharya • Built with Tailwind & Django</p>
    </footer>

    <script src="JS/header.js"></script>
    <script src="JS/projects.js"></script>

</body>
</html>
