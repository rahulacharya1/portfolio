<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills | Rahul Kumar Acharya</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-menu { animation: fadeInDown 0.3s ease-out forwards; }
        
        /* Custom Sky-Blue Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #020617; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #020617; }

        .skill-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .skill-card:hover { transform: translateY(-10px); border-color: #38bdf8; box-shadow: 0 20px 25px -5px rgba(14, 165, 233, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-gray-200">

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-4">
                Technical <span class="text-sky-400">Arsenal</span>
            </h2>
            <p class="text-slate-400 max-w-3xl mx-auto text-lg">
                My professional toolkit for building, scaling, and deploying full-stack applications.
            </p>
        </div>

        <div id="skills-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <footer class="text-center py-10 text-slate-500 bg-slate-950 border-t border-slate-900">
        <p class="text-sm">© 2026 Rahul Kumar Acharya • Full-Stack Developer</p>
    </footer>

    <script>
        const skills = [
            { title: "React", desc: "Building dynamic UIs with Hooks, Context API, and modern state management.", img: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg" },
            { title: "Django", desc: "Developing secure backends, RESTful APIs, and complex database architectures.", img: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/django/django-plain.svg" },
            { title: "Python", desc: "Core backend logic, automation scripts, and data manipulation.", img: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" },
            
            { title: "Tailwind CSS", desc: "Rapid UI development with a utility-first approach and custom design systems.", img: "https://www.vectorlogo.zone/logos/tailwindcss/tailwindcss-icon.svg" },
            { title: "JavaScript", desc: "ES6+ expertise, asynchronous programming, and DOM optimization.", img: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" },
            { title: "Firebase", desc: "Real-time databases, Google Authentication, and serverless functions.", img: "https://www.vectorlogo.zone/logos/firebase/firebase-icon.svg" },

            { title: "Vercel", desc: "Frontend deployment and hosting with a focus on speed and performance.", img: "https://www.vectorlogo.zone/logos/vercel/vercel-icon.svg" },
            { title: "Netlify", desc: "Continuous deployment for modern web projects and serverless features.", img: "https://www.vectorlogo.zone/logos/netlify/netlify-icon.svg" },
            { title: "Render", desc: "Deploying full-stack applications, web services, and static sites easily.", img: "https://render.com/brand/render_1105076560.svg" },
            
            { title: "Git & GitHub", desc: "Professional version control, collaborative workflows, and CI/CD basics.", img: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" },
            { title: "HTML5 & CSS3", desc: "Semantic structure, responsive design, and cross-browser compatibility.", img: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" }
        ];

        const container = document.getElementById("skills-container");

        skills.forEach(skill => {
            container.innerHTML += `
                <div class="skill-card bg-slate-900/40 border border-slate-800 p-8 rounded-[2rem] shadow-xl flex flex-col items-center text-center">
                    <div class="w-20 h-20 mb-6 flex items-center justify-center bg-white rounded-2xl p-4">
                        <img src="${skill.img}" alt="${skill.title}" class="w-full h-full object-contain" />
                    </div>
                    <h3 class="text-xl font-bold text-white mb-3">
                        ${skill.title}
                    </h3>
                    <p class="text-slate-400 text-sm leading-relaxed">
                        ${skill.desc}
                    </p>
                </div>
            `;
        });

        // Simple Back to Top logic
        const topBtn = document.createElement("button");
        topBtn.innerHTML = "↑";
        topBtn.className = "fixed bottom-8 right-8 bg-sky-500 text-slate-950 w-12 h-12 rounded-full font-bold shadow-lg hidden z-50 transition-all hover:scale-110";
        document.body.appendChild(topBtn);
        
        window.onscroll = () => {
            if (window.scrollY > 500) topBtn.classList.remove("hidden");
            else topBtn.classList.add("hidden");
        };
        
        topBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

    </script>
    <script src="JS/header.js"></script>
    
</body>
</html>
